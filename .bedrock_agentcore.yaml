# .bedrock_agentcore.yaml — Generated by `agentcore create` / `agentcore deploy`
# This file contains deployment-specific values (account IDs, runtime IDs, ARNs).
# It is gitignored and should NOT be committed to version control.
# Run `agentcore create` or `agentcore deploy` to regenerate it for your environment.
default_agent: openclaw_agent
agents:
  openclaw_agent:
    name: openclaw_agent
    language: typescript
    node_version: '20'
    entrypoint: bridge/agentcore-contract.js
    deployment_type: container
    platform: linux/arm64
    container_runtime: docker
    source_path: bridge
    aws:
      execution_role: ""  # Set by agentcore deploy
      account: ""         # Set by agentcore deploy
      region: ""          # Set by agentcore deploy
      ecr_repository: ""  # Set by agentcore deploy
      network_configuration:
        network_mode: VPC
        network_mode_config:
          security_groups: []
          subnets: []
      protocol_configuration:
        server_protocol: HTTP
      observability:
        enabled: true
      lifecycle_configuration:
        idle_runtime_session_timeout: 1800
        max_lifetime: 28800
